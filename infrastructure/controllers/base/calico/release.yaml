apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tigera-operator
spec:
  releaseName: tigera-operator
  chart:
    spec:
      chart: tigera-operator
      sourceRef:
        kind: HelmRepository
        name: projectcalico
        namespace: tigera-operator
  interval: 10m
  values:
    installation:
      enabled: true
      cni:
        type: Calico
      calicoNetwork:
        ipPools:
          - cidr: 10.244.0.0/16
            encapsulation: VXLAN
