apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tigera-operator
spec:
  releaseName: tigera-operator
  targetNamespace: tigera-operator
  chart:
    spec:
      chart: tigera-operator
      version: "v3.29.0"
      sourceRef:
        kind: HelmRepository
        name: projectcalico
        namespace: tigera-operator
  interval: 10m
  install:
    crds: CreateReplace
    createNamespace: true
  upgrade:
    crds: CreateReplace
  values:
    tigeraOperator:
      version: v1.36.0
    calicoctl:
      tag: v3.29.0
